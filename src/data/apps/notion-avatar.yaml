id: notion-avatar
name:
  en: Notion Avatar Maker
  zh: Notion Avatar Maker
description:
  en: "Create custom Notion-style avatars online. Choose from various styles, customize hair, facial features, and accessories. Download in SVG and PNG formats."
  zh: "在线制作 Notion 风格的自定义头像。选择不同风格、自定义发型、面部特征和配饰，支持 SVG 和 PNG 格式下载。"
review:
  en: "Notion-style avatar maker: just like customizing a character in a game, you can mix and match preset assets to create a Notion-style virtual avatar. That's how I made the profile picture for my Google account. The creator recently added an AI version that turns photos into avatars, but for me, the original character-building method has more charm—like a pixel game, with a unique kind of beauty."
  zh: "Notion 风格头像制作工具，像游戏中的捏脸一样，从预设的素材中，捏出Notion风格的虚拟头像，我 Google 账户的头像就是这么捏出来的。作者最近也更新了AI版本的照片转头像，但是原版的捏脸头像对我来说还是更有风味，就像像素游戏一样，有一种独特的美。"
url: https://notion-avatar.app/
